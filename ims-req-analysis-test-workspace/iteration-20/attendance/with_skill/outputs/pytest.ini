# pytest.ini — 考勤模块 Playwright test configuration
# 执行脚本 (cross-platform):
#   PowerShell: pytest -m p0 --headed
#   Bash:       pytest -m p0 --headed
#   Smoke:      pytest -m p0 --headed
#   Functional: pytest -m "p0 or p1" --headed
#   Full:       pytest -m "p0 or p1 or p2" --headed
#   Boundary:   pytest -m p2 --headed
#   重跑失败:   pytest --lf --reruns 2

[pytest]
testpaths = erp_tests
addopts = -v --tb=short --strict-markers --reruns 2 --reruns-delay 5
markers =
    p0: Smoke tests — must pass for every build
    p1: Functional tests — core business flows
    p2: Boundary tests — edge cases and validation
    p3: Integration tests — cross-module workflows
    flaky: Tests with known intermittent failures
    quarantine: Tests isolated due to persistent failure

# Playwright browser options
# --headed: show browser; --headless: run without UI (CI)
# slow_mo is set in conftest.py (100ms)
