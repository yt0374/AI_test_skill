[pytest]
testpaths = erp_tests
addopts = -v --tb=short --strict-markers --reruns 2 --reruns-delay 5

markers =
    p0: Smoke tests — must pass for every build
    p1: Functional tests — core business flows
    p2: Boundary tests — edge cases and validation
    p3: Integration tests — cross-module workflows
    flaky: Tests with known intermittent failures
    quarantine: Tests isolated due to persistent failure
    pc: PC端 browser tests (desktop viewport)
    pad: PAD端 tablet tests (emulated 1024x768 viewport)
    sit: SIT environment tests
    jingmen: 荆门 customer environment tests

# Retry strategy:
# --reruns 2: Retry failed tests up to 2 times (total 3 attempts)
# --reruns-delay 5: Wait 5 seconds between retries
# Flaky tests (>30% failure rate over 1 week) → quarantine with @pytest.mark.skip

# Timeouts
timeout = 300
timeout_method = thread
