# 荆门新裁剪需求2.0 - Playwright测试项目配置

[tool:pytest]
# 测试文件匹配
python_files = test_*.py

# 测试类匹配
python_classes = Test*

# 测试函数匹配
python_functions = test_*

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

# 超时
timeout = 120

# HTML报告
addopts = -v --tb=short -n auto --html=test_report.html --self-contained-html

# 标记定义
markers =
    p0: P0阻塞级用例
    p1: P1严重级用例
    p2: P2一般级用例
    p3: P3建议级用例
    cutting_task: 裁剪任务模块
    bed_task: 床次任务模块
    card_printing: 扎卡打印模块
    hanging: 缝制挂片模块
    overcut_audit: 超裁审核模块
    e2e: 端到端集成测试
