# pytest.ini — IMS ERP Test Configuration
# Project: #4140 分拣统计表 数据修正
# Environment: jingmen (bak.jmym.dtsimple.pro)
# Customer: 荆门鹰美

[pytest]
testpaths = erp_tests
addopts = -v --tb=short --strict-markers --reruns 2 --reruns-delay 5

markers =
    p0: Smoke tests — must pass for every build. Block release if failed.
    p1: Functional tests — core business flows and data-driven scenarios.
    p2: Boundary tests — edge cases, input validation, error handling.
    p3: Integration tests — cross-module workflows and end-to-end data flow.
    flaky: Tests with known intermittent failures (retry 3x).
    quarantine: Tests isolated due to persistent failure or env dependency.

# --- Execution Commands ---
#
# Smoke (P0 only):
#   pytest erp_tests/ -m p0 --headed
#
# Functional (P0+P1):
#   pytest erp_tests/ -m "p0 or p1" --headed
#
# Full (P0+P1+P2):
#   pytest erp_tests/ -m "p0 or p1 or p2" --headed
#
# Integration (P3 only):
#   pytest erp_tests/ -m p3 --headed
#
# Complete (all except quarantine):
#   pytest erp_tests/ -m "not quarantine" --headed
#
# Single file:
#   pytest erp_tests/test_smoke.py --headed
#
# Single test:
#   pytest erp_tests/test_smoke.py::TestSortingStatsSmoke::test_sorting_stats_page_loads --headed
#
# === PowerShell (Windows) ===
# Same commands work in PowerShell. If --headed fails, ensure playwright browsers are installed:
#   playwright install chromium
#
# === Bash (macOS/Linux) ===
# Same commands. Add --browser-channel=chrome if needed.
#
# === Retry Strategy ===
# - --reruns 2: Each failed test retried up to 2 times (configured in addopts above)
# - --reruns-delay 5: 5-second delay between retries
# - Flaky test criteria: Fail >2 consecutive runs with same error → mark @pytest.mark.flaky
# - Quarantine criteria: Pass rate <70% over last 10 runs → move to test_quarantine.py
#
# === Flaky Test Strategy ===
# 1. First failure: auto-retry (--reruns 2)
# 2. Still fails after retries: log to pytest_results.json
# 3. 3+ consecutive failures in same test: add @pytest.mark.flaky
# 4. Pass rate <70% over 10 runs: move to test_quarantine.py with @pytest.mark.skip
# 5. Weekly review: re-evaluate quarantined tests, fix root cause or retire

# --- Coverage (optional) ---
# Add pytest-cov for coverage:
#   pip install pytest-cov
#   pytest erp_tests/ -m "not quarantine" --cov=erp_tests --cov-report=html

# --- Timeouts ---
timeout = 60
timeout_method = signal
