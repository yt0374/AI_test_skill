# =============================================================================
# 荆门鹰美 - 裁剪系统 2.0 Playwright 测试项目配置文件
# =============================================================================
# 运行方式:
#   pytest                    # 全量执行 P0-P3
#   pytest -m p0              # 仅冒烟测试
#   pytest -m "p0 or p1"      # P0+P1
#   pytest --headed           # 有头模式（通过 conftest 自定义选项）
# =============================================================================

[pytest]
minversion = 7.0
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ---- 标记定义 ----
markers =
    p0: 冒烟测试 - 核心流程，每次提交必跑
    p1: 功能测试 - 主要功能点，迭代回归
    p2: 边界测试 - 边界条件与异常场景
    p3: 集成测试 - 端到端完整流程
    flaky: 不稳定测试 - 默认跳过，定期回顾修复
    slow: 耗时测试 - 默认执行，CI 可选择性跳过
    smoke: 冒烟测试别名
    functional: 功能测试别名
    boundary: 边界测试别名
    integration: 集成测试别名

# ---- 重试配置 (pytest-rerunfailures) ----
addopts =
    -v
    --tb=short
    --strict-markers
    --reruns 2
    --reruns-delay 5
    -p no:warnings

# ---- 日志配置 ----
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# ---- 超时配置 (pytest-timeout) ----
timeout = 120
timeout_method = signal
