[pytest]
testpaths = erp_tests
addopts = -v --tb=short --strict-markers --reruns 2 --reruns-delay 5
markers =
    p0: Smoke tests — must pass for every build
    p1: Functional tests — core business flows
    p2: Boundary tests — edge cases and validation
    p3: Integration tests — cross-module workflows
    flaky: Tests with known intermittent failures
    quarantine: Tests isolated due to persistent failure
    api: API tests using httpx
    spi: SPI callback tests

# Environment variables required:
# IMS_TEST_USERNAME - Test account username
# IMS_TEST_PASSWORD - Test account password
# IMS_BASE_URL - Base URL (default: http://test.fj.dtsimple.pro/api/ims-open-api)

# Retry strategy:
# --reruns 2: Retry failed tests up to 2 times
# --reruns-delay 5: Wait 5 seconds between retries
# Quarantine: Move persistently flaky tests to test_quarantine.py with @pytest.mark.skip
